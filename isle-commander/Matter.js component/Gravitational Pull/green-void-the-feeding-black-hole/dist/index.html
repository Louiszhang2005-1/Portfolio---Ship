  <!DOCTYPE html>
<html lang="fa" >
<head>
    <meta charset="UTF-8">
    <title>Green Supermassive Black Hole</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
            letter-spacing: 2px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }
    </style>
    <!-- Import Maps for Three.js (No install needed) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">THE FEEDING VOID | Drag & Scroll</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 1. Scene & Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.005); // Fog hides the respawn pops

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 6, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimizing performance
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 50;
        controls.minDistance = 2.5;

        // --- 2. The Black Hole Core ---
        
        // Event Horizon (Black Sphere)
        const blackHole = new THREE.Mesh(
            new THREE.SphereGeometry(1.5, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        scene.add(blackHole);

        // Accretion Disk (Shader Animation)
        const diskGeo = new THREE.RingGeometry(1.6, 6.0, 128);
        const pos = diskGeo.attributes.position;
        const v3 = new THREE.Vector3();
        for (let i = 0; i < pos.count; i++){
            v3.fromBufferAttribute(pos, i);
            diskGeo.attributes.uv.setXY(i, v3.length() < 2 ? 0 : 1, 1);
        }

        const diskMaterial = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 } },
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vPos;
                void main() {
                    vUv = uv;
                    vPos = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float uTime;
                varying vec2 vUv;
                varying vec3 vPos;

                float random(vec2 st) {
                    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
                }

                void main() {
                    float dist = length(vPos);
                    float angle = atan(vPos.y, vPos.x);
                    
                    // Spiral effect
                    float spiral = sin(angle * 8.0 + uTime * 3.0 + dist * 4.0);
                    float noise = random(vUv + uTime * 0.2);
                    
                    // Green Energy Color Palette
                    vec3 color = vec3(0.1, 1.0, 0.4); 
                    
                    float intensity = 2.5 / (dist - 1.2); 
                    float alpha = smoothstep(1.6, 1.8, dist) * (1.0 - smoothstep(5.0, 6.0, dist));
                    
                    gl_FragColor = vec4(color * intensity * (0.5 + 0.5 * spiral) * (0.6 + 0.4 * noise), alpha);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const disk = new THREE.Mesh(diskGeo, diskMaterial);
        disk.rotation.x = -Math.PI / 2;
        scene.add(disk);

        // Lensing / Glow Effect
        const glowMesh = new THREE.Mesh(
            new THREE.SphereGeometry(1.7, 32, 32),
            new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.55 - dot(vNormal, vec3(0, 0, 1.0)), 3.0);
                        gl_FragColor = vec4(0.0, 1.0, 0.2, 1.0) * intensity * 2.0;
                    }
                `,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                transparent: true
            })
        );
        glowMesh.scale.multiplyScalar(1.1);
        scene.add(glowMesh);

        // --- 3. Consumed Stars System ---
        const starsCount = 4000;
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(starsCount * 3);
        const starsVelocity = []; // Store speed for each star

        for(let i = 0; i < starsCount; i++) {
            let x = (Math.random() - 0.5) * 100;
            let y = (Math.random() - 0.5) * 50;
            let z = (Math.random() - 0.5) * 100;
            
            starsPos[i*3] = x;
            starsPos[i*3+1] = y;
            starsPos[i*3+2] = z;
            
            // Random speed for each star
            starsVelocity.push(0.02 + Math.random() * 0.05);
        }

        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({
            color: 0xccffcc,
            size: 0.1,
            transparent: true,
            opacity: 0.8
        });
        const starSystem = new THREE.Points(starsGeo, starsMat);
        scene.add(starSystem);

        // --- 4. Doomed Planets ---
        const planets = [];
        const planetCount = 4;
        const planetColors = [0x00ff00, 0x99ff99, 0x00cc00, 0xccff00];

        for(let i=0; i<planetCount; i++){
            const pGeo = new THREE.SphereGeometry(0.3 + Math.random()*0.3, 16, 16);
            const pMat = new THREE.MeshStandardMaterial({
                color: planetColors[i],
                emissive: 0x004400,
                emissiveIntensity: 0.5,
                roughness: 0.4
            });
            const mesh = new THREE.Mesh(pGeo, pMat);
            
            // Planet Object
            const planet = {
                mesh: mesh,
                radius: 15 + Math.random() * 20,
                angle: Math.random() * Math.PI * 2,
                speed: 0.005 + Math.random() * 0.01,
                yOffset: (Math.random() - 0.5) * 4
            };
            
            scene.add(mesh);
            planets.push(planet);
        }
        
        // Add a light for planets
        const pointLight = new THREE.PointLight(0x00ff00, 2, 50);
        pointLight.position.set(0, 5, 0);
        scene.add(pointLight);

        // --- 5. Post Processing (Bloom) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0;
        bloomPass.strength = 2.0; // Glow intensity
        bloomPass.radius = 0.3;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 6. Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const delta = clock.getDelta(); // Although not used heavily, good for frame independent movement

            // Update Disk
            diskMaterial.uniforms.uTime.value = time;
            disk.rotation.z = time * 0.15;
            
            // Update Glow
            glowMesh.quaternion.copy(camera.quaternion);

            // --- ANIMATE STARS (Sucking effect) ---
            const positions = starSystem.geometry.attributes.position.array;
            
            for(let i = 0; i < starsCount; i++){
                const idx = i * 3;
                let x = positions[idx];
                let y = positions[idx+1];
                let z = positions[idx+2];

                // Calculate distance to center
                const dist = Math.sqrt(x*x + y*y + z*z);
                
                // Direction towards center (normalized * speed)
                const speed = starsVelocity[i] * (1 + (10/dist)); // Accelerate as they get closer
                
                x -= (x / dist) * speed;
                y -= (y / dist) * speed;
                z -= (z / dist) * speed;

                // Spiral effect for stars near center
                if(dist < 10) {
                     const angle = speed * 0.5;
                     const cosA = Math.cos(angle);
                     const sinA = Math.sin(angle);
                     // Rotate around Y
                     const nx = x * cosA - z * sinA;
                     const nz = x * sinA + z * cosA;
                     x = nx;
                     z = nz;
                }

                // If swallowed (too close), respawn far away
                if(dist < 1.0){
                    const r = 40 + Math.random() * 20;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                }

                positions[idx] = x;
                positions[idx+1] = y;
                positions[idx+2] = z;
            }
            starSystem.geometry.attributes.position.needsUpdate = true;
            starSystem.rotation.y = time * 0.05; // Global slow rotation

            // --- ANIMATE PLANETS ---
            planets.forEach(p => {
                // Orbital mechanics simulation
                p.angle += p.speed * (20 / p.radius); // Kepler-ish: faster when closer
                p.radius -= 0.03; // Slowly getting sucked in
                
                // Update position
                p.mesh.position.x = Math.cos(p.angle) * p.radius;
                p.mesh.position.z = Math.sin(p.angle) * p.radius;
                p.mesh.position.y = Math.sin(time + p.radius) * 0.5 + p.yOffset * (p.radius/20);

                // Rotate planet itself
                p.mesh.rotation.y += 0.02;
                p.mesh.rotation.x += 0.01;

                // Respawn planet if eaten
                if(p.radius < 1.8) {
                    p.radius = 35 + Math.random() * 10;
                    p.speed = 0.005 + Math.random() * 0.01;
                    p.mesh.scale.setScalar(1);
                } else if (p.radius < 5) {
                    // Spaghettification visual (stretch as they die)
                    p.mesh.scale.x = 1 + (5 - p.radius); // Stretch
                    p.mesh.scale.y = 1 / (1 + (5 - p.radius)); // Thin
                    p.mesh.scale.z = 1 / (1 + (5 - p.radius));
                    
                    // Point the stretched planet towards center
                    p.mesh.lookAt(0,0,0);
                }
            });

            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
    
  </body>
  
</html>
